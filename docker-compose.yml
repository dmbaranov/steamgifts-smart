services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

  steamgifts:
    build: .
    container_name: steamgifts
    depends_on:
      - flaresolverr
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    restart: unless-stopped
